<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blockly to C Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/blockly/blockly.min.js"></script> 
  <style>
    :root {
      --bg: #f6f3ea;
      --ink: #1f2933;
      --panel: #fffdf8;
      --accent: #cc5a2f;
      --accent-strong: #a5421d;
      --border: #e6dbc7;
      --shadow: 0 12px 30px rgba(48, 44, 35, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, #f9d8b5 0 18%, transparent 19%),
        radial-gradient(circle at 85% 80%, #f4c59d 0 20%, transparent 21%),
        var(--bg);
      padding: 20px;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: rise 500ms ease-out;
    }

    .header {
      padding: 22px 24px 14px;
      border-bottom: 1px solid var(--border);
    }

    .title {
      margin: 0;
      font-size: clamp(1.4rem, 2.4vw, 2rem);
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 6px 0 0;
      color: #5b6873;
      font-size: 0.95rem;
    }

    .content {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr;
      gap: 16px;
      padding: 16px;
    }

    .panel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .panel-head {
      padding: 10px 12px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4a5560;
      border-bottom: 1px solid var(--border);
      background: #fff9f1;
    }

    #blocklyDiv {
      height: 440px;
      width: 100%;
    }

    .output-wrap {
      display: flex;
      flex-direction: column;
      min-height: 440px;
    }

    .actions {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      background: #fffaf4;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-family: inherit;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button:active {
      transform: translateY(0);
    }

    #output {
      margin: 0;
      padding: 14px;
      flex: 1;
      overflow: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      line-height: 1.5;
      background: #fff;
      color: #243240;
    }

    @media (max-width: 920px) {
      .content {
        grid-template-columns: 1fr;
      }

      #blocklyDiv,
      .output-wrap {
        min-height: 360px;
        height: 360px;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      .app {
        border-radius: 14px;
      }

      .header {
        padding: 16px 14px 10px;
      }

      .title {
        font-size: 1.2rem;
      }

      .subtitle {
        font-size: 0.88rem;
      }

      .content {
        gap: 12px;
        padding: 12px;
      }

      .panel-head {
        padding: 9px 10px;
        font-size: 0.76rem;
      }

      #blocklyDiv {
        height: 52vh;
        min-height: 320px;
        max-height: 520px;
      }

      .output-wrap {
        min-height: 42vh;
        height: auto;
      }

      .actions {
        position: sticky;
        bottom: 0;
        z-index: 2;
      }

      button {
        width: 100%;
        min-height: 44px;
      }

      #output {
        font-size: 0.82rem;
        padding: 12px;
      }
    }

    @media (max-width: 640px) and (orientation: landscape) {
      #blocklyDiv {
        height: 70vh;
        min-height: 260px;
      }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h2 class="title">Block to C Code Generator</h2>
      <p class="subtitle">Build logic with blocks and instantly convert it to C.</p>
    </header>

    <section class="content">
      <article class="panel">
        <div class="panel-head">Blockly Workspace</div>
        <div id="blocklyDiv"></div>
      </article>

      <article class="panel output-wrap">
        <div class="panel-head">Generated C Code</div>
        <div class="actions">
          <button id="generateBtn">Generate C Code</button>
        </div>
        <pre id="output">Click "Generate C Code" to see output.</pre>
      </article>
    </section>
  </main>

  <xml id="toolbox" style="display: none">
    <block type="start_block"></block>
    <block type="include_library"></block>
    <block type="print_text"></block>
    <block type="text_input"></block>
  </xml>

<script>
// 1. CREATE GENERATOR FIRST
const generator = new Blockly.Generator('C');
generator.ORDER_ATOMIC = 0;
let workspace;
const START_BLOCK_XML = '<xml><block type="start_block" x="20" y="20"><next><block type="include_library"><next><block type="print_text"><value name="TEXT"><block type="text_input"></block></value></block></next></block></next></block></xml>';

//Creates work Area
window.onload = function() {
  workspace = Blockly.inject('blocklyDiv', {
    toolbox: document.getElementById('toolbox')
  });
  loadStarterBlocks();

  document.getElementById("generateBtn").onclick = function() {
    try {
      let fullCode = buildCProgram();

      document.getElementById("output").textContent = fullCode;
    } catch (error) {
      document.getElementById("output").textContent = 'Error: ' + error.message;
    }
  };
};

function loadStarterBlocks() {
  const startXml = Blockly.utils.xml.textToDom(START_BLOCK_XML);
  Blockly.Xml.domToWorkspace(startXml, workspace);
}

function buildCProgram() {
  const generatedCode = generator.workspaceToCode(workspace);
  const includeLines = generatedCode.match(/^#include <[^>]+>\n/gm) || [];
  const uniqueIncludes = [...new Set(includeLines)];
  const bodyCode = generatedCode.replace(/^#include <[^>]+>\n/gm, '');
  const includeSection = uniqueIncludes.length ? uniqueIncludes.join('') : '#include <stdio.h>\n';

  return `${includeSection}
int main() {
${bodyCode}
return 0;
}`;
}

// Include block
Blockly.Blocks['start_block'] = {
  init: function () {
    this.appendDummyInput().appendField('Start');
    this.setNextStatement(true);
    this.setColour(120);
    this.setDeletable(false);
    this.setMovable(false);
  }
};

// Include block
Blockly.Blocks['include_library'] = {
  init: function () {
    this.appendDummyInput()
      .appendField('include')
      .appendField(new Blockly.FieldDropdown([
        ['stdio.h', 'stdio.h'],
        ['stdlib.h', 'stdlib.h'],
        ['string.h', 'string.h']
      ]), 'LIB');
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour(250);
  }
};

// Print block
Blockly.Blocks['print_text'] = {
  init: function () {
    this.appendValueInput("TEXT")
      .setCheck("String")
      .appendField("print");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour(160);
  }
};

// Text input block
Blockly.Blocks['text_input'] = {
  init: function () {
    this.appendDummyInput()
      .appendField('text')
      .appendField(new Blockly.FieldTextInput('Hello World'), 'TEXT');
    this.setOutput(true, "String");
    this.setColour(20);
  }
};

// GENERATOR LOGIC
generator.forBlock['start_block'] = function() {
  return '';
};

generator.forBlock['include_library'] = function(block) {
  const lib = block.getFieldValue('LIB') || 'stdio.h';
  return '#include <' + lib + '>\n';
};

generator.forBlock['print_text'] = function(block) {
  let value = generator.valueToCode(block, 'TEXT', generator.ORDER_ATOMIC) || '"Hello"';
  return 'printf("%s\\n", ' + value + ');\n';
};

generator.forBlock['text_input'] = function(block) {
  const text = escapeForCString(block.getFieldValue('TEXT'));
  return ['"' + text + '"', generator.ORDER_ATOMIC];
};

function escapeForCString(text) {
  return String(text).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
}

</script>
</body>
</html>

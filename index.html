<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Codiac</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/blockly/blockly.min.js"></script> 
  <style>
    :root {
      --bg: #f5efe6;
      --ink: #2f251c;
      --panel: #fbf6ef;
      --topbar-a: #b88758;
      --topbar-b: #a47245;
      --topbar-ink: #fff8ef;
      --line: #d9c6b3;
      --card: #fffaf4;
      --accent: #b5743e;
      --accent-strong: #925629;
      --shadow: 0 10px 24px rgba(66, 45, 27, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 90% 10%, #e8d3bc 0 10%, transparent 11%), var(--bg);
      -webkit-font-smoothing: antialiased;
      -webkit-touch-callout: none;
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 56px;
      background: linear-gradient(90deg, var(--topbar-a), var(--topbar-b));
      color: var(--topbar-ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      box-shadow: 0 2px 0 rgba(255, 255, 255, 0.08) inset;
      flex-shrink: 0;
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 1.05rem;
    }

    .menu {
      display: flex;
      gap: 18px;
      font-size: 0.9rem;
      opacity: 0.95;
    }

    .menu span,
    .auth span {
      white-space: nowrap;
    }

    .auth {
      display: flex;
      gap: 14px;
      font-size: 0.86rem;
      opacity: 0.95;
    }

    .studio {
      flex: 1;
      display: grid;
      grid-template-columns: 2fr 0.95fr;
      gap: 10px;
      padding: 10px;
    }

    .editor-pane,
    .right-pane {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .right-pane {
      height: 100%;
    }

    .editor-pane {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
    }

    .editor-tabs {
      display: flex;
      gap: 6px;
      padding: 8px;
      border-bottom: 1px solid var(--line);
      background: #efe3d4;
    }

    .tab {
      border: 1px solid #dcc6ad;
      border-radius: 999px;
      background: #ffffff;
      color: #6f533a;
      padding: 6px 12px;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .tab.active {
      background: #f4e3cf;
      border-color: #cfae8b;
      color: #6f4523;
    }

    .workspace-wrap {
      position: relative;
      flex: 1;
      min-height: 560px;
    }

    #blocklyDiv {
      height: 100%;
      width: 100%;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .output-wrap {
      display: flex;
      flex-direction: column;
      min-height: 220px;
      flex: 1;
    }

    .calc-wrap {
      display: flex;
      flex-direction: column;
      min-height: 220px;
      flex: 1;
    }

    .actions {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #f6e9db;
    }

    .btn-primary {
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-family: inherit;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .panel-head {
      padding: 10px 12px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #5f4b39;
      border-bottom: 1px solid var(--line);
      background: #f3e7d8;
    }

    #output {
      margin: 0;
      padding: 14px;
      flex: 1;
      overflow: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      line-height: 1.5;
      background: #fff;
      color: #312518;
    }

    .calc-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fffdf9;
      flex: 1;
    }

    .calc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 0.76rem;
      font-weight: 700;
      color: #6e5a47;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .field input,
    .field select {
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.95rem;
      color: #3a2d21;
      background: #fff;
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }

    .calc-result {
      margin: 0;
      border: 1px dashed #ccb39a;
      background: #fff7ed;
      border-radius: 8px;
      padding: 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.84rem;
      line-height: 1.45;
      color: #4a3422;
      white-space: pre-wrap;
    }

    .blocklyToolboxDiv {
      border-right: 1px solid #ddccb8 !important;
      background: #f8efe4 !important;
    }

    @media (max-width: 920px) {
      .studio {
        grid-template-columns: 1fr;
      }

      .workspace-wrap {
        min-height: 400px;
      }

      .calc-button {
        bottom: 20px;
        right: 20px;
        width: 64px;
        height: 64px;
        font-size: 28px;
      }
    }

    @media (max-width: 768px) {
      .topbar {
        height: 52px;
        padding: 0 12px;
      }

      .brand {
        font-size: 1rem;
      }

      .studio {
        padding: 6px;
        gap: 6px;
      }

      .workspace-wrap {
        min-height: 350px;
      }

      .field label {
        font-size: 0.8rem;
      }

      #output {
        font-size: 0.85rem;
        padding: 12px;
      }

      .calc-grid {
        grid-template-columns: 1fr;
      }

      .modal-container {
        max-width: 90vw;
      }

      .numbadpad {
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
      }
    }

    @media (max-width: 640px) {
      .menu {
        display: none;
      }

      .topbar {
        height: 48px;
        padding: 0 10px;
      }

      .brand {
        font-size: 0.95rem;
      }

      .auth {
        gap: 10px;
        font-size: 0.78rem;
      }

      .studio {
        padding: 6px;
        gap: 6px;
        grid-template-columns: 1fr;
      }

      .workspace-wrap {
        min-height: 300px;
      }

      .output-wrap {
        min-height: auto;
        height: auto;
      }

      .actions {
        position: sticky;
        bottom: 0;
        z-index: 2;
        padding: 10px;
      }

      .btn-primary {
        width: 100%;
        min-height: 48px;
        font-size: 1rem;
        padding: 12px 16px;
      }

      #output {
        font-size: 0.8rem;
        padding: 10px;
        line-height: 1.4;
      }

      .panel-head {
        font-size: 0.75rem;
        padding: 8px 10px;
      }

      .calc-grid {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .calc-button {
        bottom: 16px;
        right: 16px;
        width: 56px;
        height: 56px;
        font-size: 24px;
      }

      .modal-container {
        width: 95vw;
        max-width: 95vw;
        max-height: 85vh;
      }

      .modal-header {
        padding: 12px 14px;
      }

      .modal-title {
        font-size: 0.85rem;
      }

      .modal-body {
        padding: 12px 14px;
        gap: 10px;
      }

      .field input,
      .field select {
        height: 48px;
        font-size: 1rem;
        padding: 0 12px;
      }

      .field label {
        font-size: 0.75rem;
      }

      .numberpad {
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
        margin-top: 6px;
      }

      .numpad-btn {
        min-height: 48px;
        font-size: 1rem;
        padding: 8px 6px;
      }

      .numpad-btn.wide {
        grid-column: span 3;
      }

      .calc-result {
        font-size: 0.8rem;
        padding: 10px;
        line-height: 1.4;
      }
    }

    @media (max-width: 480px) {
      .topbar {
        height: 48px;
        padding: 0 8px;
      }

      .brand {
        font-size: 0.9rem;
      }

      .studio {
        padding: 4px;
        gap: 4px;
      }

      .workspace-wrap {
        min-height: 280px;
      }

      .actions {
        padding: 8px;
      }

      .calc-button {
        width: 52px;
        height: 52px;
        font-size: 22px;
        bottom: 12px;
        right: 12px;
      }

      .numberpad {
        grid-template-columns: repeat(3, 1fr);
        gap: 3px;
      }

      .numpad-btn {
        min-height: 44px;
        font-size: 0.95rem;
        padding: 6px 4px;
      }

      .field input,
      .field select {
        height: 44px;
        font-size: 16px;
      }

      .modal-container {
        max-height: 80vh;
      }
    }

    @media (max-width: 640px) and (orientation: landscape) {
      .workspace-wrap {
        min-height: 280px;
      }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Calculator Circle Button */
    .calc-button {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: white;
      font-size: 32px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(147, 86, 41, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 120ms ease, box-shadow 120ms ease;
      z-index: 999;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    .calc-button:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 16px rgba(147, 86, 41, 0.5);
    }

    .calc-button:active,
    .calc-button:focus {
      transform: scale(0.95);
      outline: 2px solid rgba(255, 255, 255, 0.5);
      outline-offset: 2px;
    }

    /* Modal Overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      animation: fadeIn 150ms ease;
    }

    .modal-overlay.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Modal Container */
    .modal-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 90%;
      max-width: 420px;
      max-height: 90vh;
      z-index: 1001;
      display: none;
      flex-direction: column;
      animation: slideUp 200ms ease;
      overflow-y: auto;
    }

    .modal-container.active {
      display: flex;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translate(-50%, -45%);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: #f6e9db;
    }

    .modal-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.03em;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--ink);
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: background 120ms ease;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    .modal-close:hover {
      background: rgba(0, 0, 0, 0.08);
    }

    .modal-close:active,
    .modal-close:focus {
      background: rgba(0, 0, 0, 0.12);
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .modal-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .numberpad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 8px;
    }

    .numpad-btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffaf4;
      color: var(--ink);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: 1rem;
      padding: 12px 8px;
      cursor: pointer;
      transition: all 120ms ease;
      user-select: none;
      touch-action: manipulation;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-user-select: none;
    }

    .numpad-btn:hover {
      background: #f5e9dc;
      border-color: #cdb39a;
    }

    .numpad-btn:active,
    .numpad-btn:focus {
      background: #ede1d0;
      transform: scale(0.97);
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .numpad-btn.wide {
      grid-column: span 2;
    }

    .numpad-btn.del {
      background: #ffe0e0;
      color: #c24848;
    }

    .numpad-btn.del:hover {
      background: #ffc9c9;
    }

    .numpad-btn.clear {
      background: #e0f0ff;
      color: #2563b8;
    }

    .numpad-btn.clear:hover {
      background: #c9e0ff;
    }

    @media (max-width: 920px) {
      .calc-button {
        bottom: 20px;
        right: 20px;
        width: 64px;
        height: 64px;
        font-size: 28px;
      }
    }

    @media (max-width: 640px) {
      .calc-button {
        bottom: 16px;
        right: 16px;
        width: 56px;
        height: 56px;
        font-size: 24px;
      }

      .modal-container {
        width: 95%;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">Codiac</div>
      <div class="auth">
      </div>
    </header>

    <!-- Calculator Circle Button -->
    <button id="calcCircleBtn" class="calc-button" title="Open Calculator">🧮</button>

    <main class="studio">
      <section class="editor-pane">
        <div class="editor-tabs">
        </div>
        <div class="workspace-wrap">
          <div id="blocklyDiv"></div>
        </div>
      </section>

      <aside class="right-pane">
        <article class="card output-wrap">
          <div class="panel-head">Generated C Code</div>
          <div class="actions">
            <button id="generateBtn" class="btn-primary">Generate C Code</button>
          </div>
          <pre id="output">Click "Generate C Code" to see output.</pre>
        </article>
      </aside>
    </main>
  </div>

  <!-- Calculator Modal -->
  <div id="calcModal" class="modal-overlay">
    <div class="modal-container">
      <div class="modal-header">
        <div class="modal-title">Hexadecimal Calculator</div>
        <button id="calcModalClose" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="calc-grid">
          <div class="field">
            <label for="hexA">Value A</label>
            <input id="hexA" type="text" value="0x0C" placeholder="0x0C" />
          </div>
          <div class="field">
            <label for="hexB">Value B</label>
            <input id="hexB" type="text" value="0x30" placeholder="0x30" />
          </div>
        </div>
        
        <!-- Shared Number Pad -->
        <div class="numberpad">
          <button type="button" class="numpad-btn" data-value="1">1</button>
          <button type="button" class="numpad-btn" data-value="2">2</button>
          <button type="button" class="numpad-btn" data-value="3">3</button>
          <button type="button" class="numpad-btn del" data-action="backspace">DEL</button>
          <button type="button" class="numpad-btn" data-value="4">4</button>
          <button type="button" class="numpad-btn" data-value="5">5</button>
          <button type="button" class="numpad-btn" data-value="6">6</button>
          <button type="button" class="numpad-btn" data-value="7">7</button>
          <button type="button" class="numpad-btn" data-value="8">8</button>
          <button type="button" class="numpad-btn" data-value="9">9</button>
          <button type="button" class="numpad-btn" data-value="0">0</button>
          <button type="button" class="numpad-btn" data-value="A">A</button>
          <button type="button" class="numpad-btn" data-value="B">B</button>
          <button type="button" class="numpad-btn" data-value="C">C</button>
          <button type="button" class="numpad-btn" data-value="D">D</button>
          <button type="button" class="numpad-btn" data-value="E">E</button>
          <button type="button" class="numpad-btn" data-value="F">F</button>
          <button type="button" class="numpad-btn clear wide" data-action="clear">CLEAR</button>
        </div>
        
        <div class="field">
          <label for="hexOp">Operation</label>
          <select id="hexOp">
            <option value="OR">OR (|)</option>
            <option value="AND">AND (&)</option>
          </select>
        </div>
        <button id="calcBtn" class="btn-primary">Calculate</button>
        <pre id="calcResult" class="calc-result">Result: 0x3C</pre>
      </div>
    </div>
    </main>
  </div>

  <xml id="toolbox" style="display: none">
    <block type="start_block"></block>
    <block type="include_library"></block>
    <block type="initialize_8052"></block>
    <block type="assign_register_hex"></block>
    <block type="assign_bit_value"></block>
    <block type="while_forever"></block>
    <block type="print_text"></block>
    <block type="text_input"></block>
  </xml>

<script>
// 1. CREATE GENERATOR FIRST
const generator = new Blockly.Generator('C');
generator.ORDER_ATOMIC = 0;
let workspace;
const els = {
  generateBtn: document.getElementById('generateBtn'),
  output: document.getElementById('output'),
  calcBtn: document.getElementById('calcBtn'),
  hexA: document.getElementById('hexA'),
  hexB: document.getElementById('hexB'),
  hexOp: document.getElementById('hexOp'),
  calcResult: document.getElementById('calcResult')
};

// Modal Helper Functions
function openCalcModal() {
  const modal = document.getElementById('calcModal');
  const container = modal.querySelector('.modal-container');
  modal.classList.add('active');
  container.classList.add('active');
}

function closeCalcModal() {
  const modal = document.getElementById('calcModal');
  const container = modal.querySelector('.modal-container');
  modal.classList.remove('active');
  container.classList.remove('active');
}

// Number Pad Handler
let currentActiveInput = null;

function setupNumberPadHandlers() {
  const numpadButtons = document.querySelectorAll('.numpad-btn');
  
  // Track which input is focused
  els.hexA.addEventListener('focus', function() {
    currentActiveInput = this;
  });
  els.hexB.addEventListener('focus', function() {
    currentActiveInput = this;
  });
  
  // Set default to hexA
  currentActiveInput = els.hexA;
  
  numpadButtons.forEach(function(button) {
    button.addEventListener('click', function() {
      const value = this.getAttribute('data-value');
      const action = this.getAttribute('data-action');
      
      if (!currentActiveInput) {
        currentActiveInput = els.hexA;
      }
      
      let currentVal = currentActiveInput.value.trim();
      
      if (action === 'backspace') {
        // Remove last character
        currentActiveInput.value = currentVal.slice(0, -1);
      } else if (action === 'clear') {
        // Clear input
        currentActiveInput.value = '';
      } else if (value) {
        // Append number/letter
        currentActiveInput.value = currentVal + value;
      }
      
      // Trigger input event to update calculation
      currentActiveInput.dispatchEvent(new Event('input', { bubbles: true }));
    });
  });
}

// Mobile Optimization
function setupMobileOptimizations() {
  // Prevent unwanted zooming on double-tap
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function(event) {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) {
      event.preventDefault();
    }
    lastTouchEnd = now;
  }, false);

  // Fix for iOS Safari address bar visibility
  const vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', vh + 'px');
  window.addEventListener('resize', function() {
    const vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', vh + 'px');
  });

  // Prevent context menu on long press for better UX
  document.addEventListener('contextmenu', function(e) {
    if (e.target.classList.contains('numpad-btn') || e.target.getAttribute('type') === 'button') {
      e.preventDefault();
    }
  }, false);

  // Smooth scrolling for modal on mobile
  const modalContainer = document.querySelector('.modal-container');
  if (modalContainer && navigator.maxTouchPoints > 0) {
    modalContainer.style.webkitOverflowScrolling = 'touch';
  }
}

//Creates work Area
window.onload = function() {
  // Setup mobile optimizations first
  setupMobileOptimizations();

  workspace = Blockly.inject('blocklyDiv', {
    toolbox: document.getElementById('toolbox')
  });
  window.addEventListener('resize', scheduleWorkspaceResize);

  // Modal button handlers
  document.getElementById('calcCircleBtn').onclick = openCalcModal;
  document.getElementById('calcModalClose').onclick = closeCalcModal;
  document.getElementById('calcModal').onclick = function(event) {
    if (event.target === this) {
      closeCalcModal();
    }
  };

  // Setup number pad handlers
  setupNumberPadHandlers();

  els.generateBtn.onclick = function() {
    try {
      let fullCode = buildCProgram();

      els.output.textContent = fullCode;
    } catch (error) {
      els.output.textContent = 'Error: ' + error.message;
    }
  };

  els.calcBtn.onclick = runHexCalculation;
  els.hexA.addEventListener('input', runHexCalculation);
  els.hexB.addEventListener('input', runHexCalculation);
  els.hexOp.addEventListener('change', runHexCalculation);
  runHexCalculation();
};

let resizeFrameId = null;

function scheduleWorkspaceResize() {
  if (!workspace) {
    return;
  }
  if (resizeFrameId !== null) {
    cancelAnimationFrame(resizeFrameId);
  }
  resizeFrameId = requestAnimationFrame(function () {
    Blockly.svgResize(workspace);
    resizeFrameId = null;
  });
}

function buildCProgram() {
  const includes = new Set();
  const declarations = [];
  const statements = [];
  const topBlocks = workspace.getTopBlocks(true);

  for (let i = 0; i < topBlocks.length; i++) {
    collectCodeFromChain(topBlocks[i], includes, declarations, statements);
  }

  if (includes.size === 0) {
    includes.add('#include <8052.h>\n');
  }

  const includeSection = Array.from(includes).join('');
  const declarationSection = declarations.length ? declarations.join('') + '\n' : '';
  const statementSection = statements.length ? indentCodeLines(statements.join('')) : '';

  return `${includeSection}
${declarationSection}void main(void) {
${statementSection}}`;
}

function collectCodeFromChain(block, includes, declarations, statements) {
  const declarationTypes = new Set(['initialize_8052']);
  const statementTypes = new Set(['assign_register_hex', 'assign_bit_value', 'while_forever', 'print_text']);
  let current = block;

  while (current) {
    const type = current.type;
    if (type === 'include_library') {
      const code = generateBlockCode(current);
      if (code) {
        includes.add(code);
      }
    } else if (declarationTypes.has(type)) {
      const code = generateBlockCode(current);
      if (code) {
        declarations.push(code);
      }
    } else if (statementTypes.has(type)) {
      const code = generateBlockCode(current);
      if (code) {
        statements.push(code);
      }
    }
    current = current.getNextBlock();
  }
}

function generateBlockCode(block) {
  const blockGenerator = generator.forBlock[block.type];
  if (typeof blockGenerator !== 'function') {
    return '';
  }
  const result = blockGenerator(block, generator);
  return Array.isArray(result) ? result[0] : result;
}

function indentCodeLines(code) {
  const lines = String(code)
    .split('\n')
    .filter(function (line, index, arr) {
      return !(index === arr.length - 1 && line === '');
    });
  return lines.map(function (line) { return line ? '    ' + line : ''; }).join('\n') + '\n';
}

// Include block
Blockly.Blocks['start_block'] = {
  init: function () {
    this.appendDummyInput().appendField('Start');
    this.setNextStatement(true);
    this.setColour(120);
    this.setDeletable(true);
    this.setMovable(true);
  }
};

// Include block
Blockly.Blocks['include_library'] = {
  init: function () {
    this.appendDummyInput()
      .appendField('include')
      .appendField(new Blockly.FieldDropdown([
        ['8052.h', '8052.h']
      ]), 'LIB');
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour(250);
  }
};

Blockly.Blocks['initialize_8052'] = {
  init: function () {
    this.appendDummyInput()
      .appendField('Initialize 8052 Ports');
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour(210);
  }
};

Blockly.Blocks['assign_register_hex'] = {
  init: function () {
    this.appendDummyInput()
      .appendField('set')
      .appendField(new Blockly.FieldTextInput('P3M0'), 'TARGET')
      .appendField('=')
      .appendField(new Blockly.FieldTextInput('0x0C'), 'VALUE');
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour(40);
  }
};

Blockly.Blocks['assign_bit_value'] = {
  init: function () {
    this.appendDummyInput()
      .appendField('set bit')
      .appendField(new Blockly.FieldTextInput('P3_2'), 'TARGET')
      .appendField('=')
      .appendField(new Blockly.FieldDropdown([
        ['0', '0'],
        ['1', '1']
      ]), 'VALUE');
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour(65);
  }
};

Blockly.Blocks['while_forever'] = {
  init: function () {
    this.appendDummyInput().appendField('while(1);');
    this.setPreviousStatement(true);
    this.setColour(15);
  }
};

// Print block
Blockly.Blocks['print_text'] = {
  init: function () {
    this.appendValueInput("TEXT")
      .setCheck("String")
      .appendField("print");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour(160);
  }
};

// Text input block
Blockly.Blocks['text_input'] = {
  init: function () {
    this.appendDummyInput()
      .appendField('text')
      .appendField(new Blockly.FieldTextInput('Hello World'), 'TEXT');
    this.setOutput(true, "String");
    this.setColour(20);
  }
};

// GENERATOR LOGIC
generator.forBlock['start_block'] = function() {
  return '';
};

generator.forBlock['include_library'] = function(block) {
  const lib = block.getFieldValue('LIB') || '8052.h';
  return '#include <' + lib + '>\n';
};

generator.forBlock['initialize_8052'] = function() {
  return '//define pinmode sfr of port 3\n' +
    '__sfr __at (0xB1) P3M1;\n' +
    '__sfr __at (0xB2) P3M0;\n' +
    '//define pinmode sfr of port 5\n' +
    '__sfr __at (0xCA) P5M0;\n' +
    '__sfr __at (0xC9) P5M1;\n' +
    '//set values of output port register\n' +
    '__sbit __at (0xCC) P5_4;\n' +
    '__sbit __at (0xCD) P5_5;\n';
};

generator.forBlock['assign_register_hex'] = function(block) {
  const target = sanitizeIdentifier(block.getFieldValue('TARGET'), 'TEMP_REG');
  const value = normalizeHexValue(block.getFieldValue('VALUE'), '0x00');
  return target + ' = ' + value + ';\n';
};

generator.forBlock['assign_bit_value'] = function(block) {
  const target = sanitizeIdentifier(block.getFieldValue('TARGET'), 'TEMP_BIT');
  const value = block.getFieldValue('VALUE') === '1' ? '1' : '0';
  return target + ' = ' + value + ';\n';
};

generator.forBlock['while_forever'] = function() {
  return 'while(1);\n';
};

generator.forBlock['print_text'] = function(block) {
  let value = generator.valueToCode(block, 'TEXT', generator.ORDER_ATOMIC) || '"Hello"';
  return 'printf("%s\\n", ' + value + ');\n';
};

generator.forBlock['text_input'] = function(block) {
  const text = escapeForCString(block.getFieldValue('TEXT'));
  return ['"' + text + '"', generator.ORDER_ATOMIC];
};

function escapeForCString(text) {
  return String(text).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
}

function sanitizeIdentifier(name, fallback) {
  const cleaned = String(name || '').trim().replace(/[^A-Za-z0-9_]/g, '');
  if (!cleaned) {
    return fallback;
  }
  return /^[A-Za-z_]/.test(cleaned) ? cleaned : '_' + cleaned;
}

function normalizeHexValue(value, fallback) {
  const raw = String(value || '').trim();
  if (/^0x[0-9a-fA-F]+$/.test(raw)) {
    return raw;
  }
  if (/^[0-9a-fA-F]+$/.test(raw)) {
    return '0x' + raw.toUpperCase();
  }
  if (/^[0-9]+$/.test(raw)) {
    return raw;
  }
  return fallback;
}

function parseNumericInput(raw) {
  const value = String(raw || '').trim();
  if (!value) {
    return null;
  }
  if (/^0x[0-9a-fA-F]+$/.test(value)) {
    return parseInt(value, 16);
  }
  if (/^[0-9]+$/.test(value)) {
    return parseInt(value, 10);
  }
  if (/^[0-9a-fA-F]+$/.test(value)) {
    return parseInt(value, 16);
  }
  return null;
}

function formatHex(value) {
  const normalized = Number(value) >>> 0;
  return '0x' + normalized.toString(16).toUpperCase();
}

function formatBinary(value) {
  const normalized = Number(value) >>> 0;
  const bin = normalized.toString(2);
  const padLength = Math.max(8, Math.ceil(bin.length / 8) * 8);
  return bin.padStart(padLength, '0');
}

function runHexCalculation() {
  const a = parseNumericInput(els.hexA.value);
  const b = parseNumericInput(els.hexB.value);

  if (a === null || b === null) {
    els.calcResult.textContent = 'Enter valid values like 0x0C, 0x30, or decimal numbers.';
    return;
  }

  const op = els.hexOp.value;
  const result = op === 'AND' ? (a & b) : (a | b);
  els.calcResult.textContent =
    'A = ' + formatHex(a) + ' (' + a + ')\n' +
    'B = ' + formatHex(b) + ' (' + b + ')\n' +
    'Operation = ' + op + '\n' +
    'Result (HEX) = ' + formatHex(result) + '\n' +
    'Result (DEC) = ' + result + '\n' +
    'Result (BIN) = ' + formatBinary(result);
}
